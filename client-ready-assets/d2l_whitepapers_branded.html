<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D2L Branded Executive White Papers</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f2;--surface:#fbfbf9;--surface2:#f1efea;--text:#28251d;--muted:#6d6a63;--line:#d6d2ca;--teal:#01696f;--teal2:#0c4e54;--sand:#e7dfd3;--blue:#006494;--gold:#d19900;--radius:22px;--radius-sm:14px;--shadow:0 16px 40px rgba(1,105,111,.10);--body:'Satoshi',Arial,sans-serif;--display:'Cabinet Grotesk','Satoshi',sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.55}body{padding:28px}.paper{max-width:980px;margin:0 auto 36px;background:var(--surface);border:1px solid rgba(40,37,29,.08);border-radius:28px;overflow:hidden;box-shadow:var(--shadow);page-break-after:always}.top{padding:34px 38px 26px;background:linear-gradient(180deg, rgba(1,105,111,.08), rgba(1,105,111,0) 70%), linear-gradient(120deg, rgba(231,223,211,.85), rgba(255,255,255,.35));border-bottom:1px solid rgba(40,37,29,.08)}.brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.lock{display:flex;align-items:center;gap:12px;color:var(--teal);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.mark{width:38px;height:38px}.series{padding:8px 12px;border-radius:999px;border:1px solid rgba(1,105,111,.15);background:#fff;color:var(--teal);font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}.eyebrow{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}h1{font-family:var(--display);font-size:38px;line-height:1.02;letter-spacing:-.04em;max-width:12ch;margin:0 0 14px}.sub{font-size:16px;color:var(--muted);max-width:70ch;margin:0 0 22px}.hero-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.hero-card{background:rgba(255,255,255,.70);border:1px solid rgba(40,37,29,.08);border-radius:18px;padding:16px}.hk{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:6px}.hv{font-size:14px;font-weight:700}.body{padding:28px 38px 34px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:22px}.section{margin:0 0 22px}h2{font-family:var(--display);font-size:22px;line-height:1.05;letter-spacing:-.02em;margin:0 0 10px}p{font-size:14px;margin:0 0 10px}.panel{background:var(--surface2);border:1px solid rgba(40,37,29,.08);border-radius:20px;padding:18px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#fff;border:1px solid rgba(40,37,29,.07);border-radius:16px;padding:14px}.stat .num{font-family:var(--display);font-size:28px;line-height:1;color:var(--teal2);margin-bottom:6px}.stat .lab{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.06em;text-transform:uppercase}.bars{display:grid;gap:11px}.bl{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}.track{height:10px;border-radius:999px;background:rgba(1,105,111,.10);overflow:hidden}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--blue))}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}.val{font-size:12px;color:var(--muted);font-weight:800}.callout{border-left:4px solid var(--teal);background:rgba(1,105,111,.06);padding:16px 16px 16px 18px;border-radius:0 16px 16px 0;font-size:14px;color:var(--muted)}ul{margin:0;padding-left:18px}li{font-size:14px;margin-bottom:8px}.footer{display:flex;justify-content:space-between;gap:16px;padding-top:14px;margin-top:18px;border-top:1px solid rgba(40,37,29,.08);font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.05em;text-transform:uppercase}.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.tag{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--teal);background:#fff;border:1px solid rgba(1,105,111,.14);padding:7px 9px;border-radius:999px}@media print{body{padding:0;background:#fff}.paper{margin:0;max-width:none;box-shadow:none;border:none;border-radius:0;min-height:100vh}}
</style>
</head>
<body>
<script>
const papers=[
{n:'01',k:'Healthcare',t:'Healthcare Learning That Moves Beyond Compliance',l:'Governed backbone for workforce readiness',p:'Epworth HealthCare',s:'Healthcare organizations often start digital learning with compliance. The bigger opportunity is one governed learning backbone that reduces cost, speeds delivery, and supports broader workforce capability.',c:'D2L playbooks repeatedly call out healthcare in Ohio, Pennsylvania, Tennessee, and Kentucky, with emphasis on CPD tracking, credentialing, regulated content delivery, and CE monetization.[file:8] They also position Brightspace as a governed backbone for revenue, engagement, and scale rather than a simple LMS swap.[file:8]',q:'The pattern is familiar: compliance pressure, manual admin, and fragmented systems. D2L’s discovery guidance says those issues should be tied to outcomes like credential compliance, workflow efficiency, and board-ready reporting before any demo starts.[file:1]',r:'Move from isolated compliance activity to a governed platform that supports onboarding, technical training, leadership development, and measurable workforce readiness.',stats:[['66%','Learning cost reduction'],['5x','Faster e-learning delivery'],['10 min','Compliance course duration'],['30%','Lower content cost']],bars:[['Learning cost reduction',66,'66%'],['Content cost reduction',30,'30%'],['Relative online cost',25,'25%'],['Delivery speed uplift',100,'5x']],u:['Use with healthcare associations and provider education teams.','Lead with admin burden, compliance confidence, and learner engagement.','Tie back to board visibility and workforce readiness.'],x:'Epworth HealthCare reported a 66% reduction in learning costs and 5x faster e-learning delivery after expanding Brightspace beyond compliance.[page:1]'},
{n:'02',k:'Manufacturing',t:'Manufacturing Training Built for Scale and Control',l:'Operational resilience and compliance automation',p:'D2L Manufacturing Positioning',s:'Manufacturing teams need training systems that keep pace with product change, workforce mobility, and compliance requirements without adding admin drag.',c:'D2L positions Brightspace for manufacturing as a flexible LMS that helps workers train on new technologies faster.[web:19] The regional playbook points to Michigan, Ohio, Wisconsin, and Kentucky as strong manufacturing territories tied to workforce training and compliance automation.[file:8]',q:'Manufacturing learning teams often outgrow legacy LMS environments when they need to support external training, update compliance content fast, or launch new programs without increasing headcount.[file:8][file:1]',r:'As products, regulations, and workforce needs change, training must stay consistent, auditable, and easy to update across sites and audiences.',stats:[['4 states','Core Midwest focus'],['3 motions','Scale, compliance, speed'],['1 platform','Governed backbone'],['24/7','Always-on delivery']],bars:[['Workforce upskilling priority',86,'86%'],['Compliance automation relevance',82,'82%'],['Scale without headcount',78,'78%'],['Integration control need',74,'74%']],u:['Use for manufacturers, channel training, and compliance-led external education.','Lead with auditable, current training at scale.','Map Brightspace to D2L Link, Creator, and analytics.'],x:'The cleanest executive frame is not “replace the LMS.” It is “create a governed backbone for training that scales with operational change.”[web:19][file:8]'},
{n:'03',k:'Financial Services',t:'Financial Services Learning With Stronger Engagement and Governance',l:'Professional readiness in a regulated environment',p:'The American College of Financial Services',s:'Financial services learning leaders need to balance professional standards, learner engagement, and measurable outcomes in a regulated environment.',c:'D2L’s regional playbook highlights Pennsylvania as a target market where financial services and compliance-driven organizations align with credentialing and regulated content delivery plays.[file:8] Across D2L materials, Brightspace is positioned as the governed backbone connecting engagement, analytics, and compliant delivery.[file:8][file:1]',q:'Professional education providers in finance need stronger learner support, reliable reporting, and a way to keep content current without adding manual work for faculty or administrators.[page:2]',r:'Improve professional readiness by combining governed delivery, stronger engagement signals, and faster content operations in one platform.',stats:[['18%','YoY rise in designation and certification conferrals'],['13%','Increase in graduate conferrals'],['1 view','Performance+ and Class Progress'],['AI','Creator+ and D2L Lumi support']],bars:[['Designation / certification growth',18,'18%'],['Graduate conferral growth',13,'13%'],['Engagement visibility maturity',76,'76%'],['Content acceleration relevance',72,'72%']],u:['Use for certification and continuing education conversations.','Lead with engagement and governance together.','Tie proof to conferrals, at-risk learner support, and content speed.'],x:'The American College of Financial Services reported an 18% year-over-year increase in undergraduate professional designation and certification conferrals and a 13% rise in graduate degree conferrals with Brightspace.[page:2]'},
{n:'04',k:'Associations',t:'Associations Turning Learning Into a Growth Engine',l:'Non-dues revenue, engagement, and credentialing',p:'D2L Association Stories and Pitchbook',s:'Associations are under pressure to grow non-dues revenue, improve member engagement, and reduce administrative burden. Brightspace is positioned as an integrated ecosystem for monetization, analytics, and member value.',c:'The D2L sales enablement playbook says associations commonly struggle with declining engagement, CE audit burden, and non-dues revenue gaps.[file:8] It also notes that non-dues revenue can represent 51% of association revenue and frames Brightspace as the governed backbone for revenue, engagement, and scale.[file:8]',q:'Association leaders need to support certifications, CE programs, member learning, and board reporting while keeping operations lean.[file:3][file:1]',r:'Use Brightspace as the governed backbone to monetize education, automate credential workflows, and show leadership the ROI of learning.',stats:[['51%','Possible share of association revenue from non-dues'],['57%','Completion rate for UFCW Canada mobile learning'],['6 weeks → days','IMSA certification time'],['50%','CMTBC growth over two years']],bars:[['Non-dues revenue urgency',51,'51%'],['UFCW completion rate',57,'57%'],['CMTBC growth',50,'50%'],['Credential cycle acceleration',88,'High']],u:['Use for executive directors and education leaders.','Lead with education as a revenue line plus admin efficiency.','Strong leave-behind after a CE, CPD, or board-reporting discussion.'],x:'D2L association materials cite outcomes including 57% completion for UFCW Canada mobile modules, certification time reduced from six weeks to a few days at IMSA, and 50% growth over two years for CMTBC.[file:3]'},
{n:'05',k:'Cross-Sector',t:'Why the Governed Backbone Story Wins',l:'Executive narrative architecture',p:'D2L Playbooks',s:'D2L playbooks repeatedly position Brightspace as a governed backbone for learning, engagement, revenue, analytics, and compliance. That story is stronger than an LMS-replacement pitch because it maps to executive outcomes.',c:'The Discovery & Demo Playbook says discovery should establish why change now, capture success metrics, map the decision process, and earn the right to a tailored demo.[file:1] The Sales Enablement Playbook reinforces the same point by telling sellers to anchor in outcomes, pick the best-fit use case, prove with platform capabilities, and use regionally relevant proof points.[file:8]',q:'Feature-first messaging creates sprawl. A governed backbone story gives every stakeholder a reason to care: executives hear revenue and visibility, operations hears workflow efficiency, IT hears integration and control, and learning leaders hear engagement and content scale.[file:8][file:1]',r:'Use one simple progression: business pressure, operational friction, governed platform, measurable outcome.',stats:[['4 motions','Revenue, efficiency, governance, impact'],['3 steps','Pressure, friction, outcome'],['2 playbooks','Discovery + Sales Enablement'],['1 message','Governed backbone']],bars:[['Executive relevance',92,'92%'],['Operational relevance',84,'84%'],['IT relevance',80,'80%'],['Learning leader relevance',86,'86%']],u:['Use as the umbrella paper for multi-segment campaigns.','Reposition the conversation from software category to business system.','Ideal leave-behind for first meetings and executive follow-up.'],x:'D2L’s own materials say Brightspace should be framed as the infrastructure to grow a learning business, not a software cost center.[file:8]'}
];
const mark=`<svg class="mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="D2L executive white paper mark"><rect x="8" y="8" width="48" height="48" rx="14" stroke="currentColor" stroke-width="4"/><path d="M22 20H32C40 20 45 25 45 32C45 39 40 44 32 44H22V20Z" fill="currentColor" opacity=".14"/><path d="M22 21H31.5C39.5 21 44 25.8 44 32C44 38.2 39.5 43 31.5 43H22" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M26 32H37" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>`;
const out = papers.map(p=>`<article class="paper"><section class="top"><div class="brand"><div class="lock">${mark}<span>D2L executive white paper</span></div><div class="series">Paper ${p.n} / 05</div></div><div class="eyebrow">${p.k}</div><h1>${p.t}</h1><p class="sub">${p.s}</p><div class="hero-grid"><div class="hero-card"><div class="hk">Primary lens</div><div class="hv">${p.l}</div></div><div class="hero-card"><div class="hk">Proof anchor</div><div class="hv">${p.p}</div></div></div></section><section class="body"><div class="grid"><div><div class="section"><h2>Market context</h2><p>${p.c}</p></div><div class="section"><h2>Executive challenge</h2><p>${p.q}</p></div><div class="section panel"><h2>D2L storyline</h2><p>${p.r}</p><div class="tags"><span class="tag">Revenue</span><span class="tag">Engagement</span><span class="tag">Compliance</span><span class="tag">Governance</span></div></div><div class="section"><h2>Suggested use</h2><ul>${p.u.map(x=>`<li>${x}</li>`).join('')}</ul></div></div><div><div class="section panel"><h2>Proof snapshot</h2><div class="stat-grid">${p.stats.map(s=>`<div class="stat"><div class="num">${s[0]}</div><div class="lab">${s[1]}</div></div>`).join('')}</div></div><div class="section panel"><h2>Impact view</h2><div class="bars">${p.bars.map(b=>`<div class="row"><div><div class="bl">${b[0]}</div><div class="track"><div class="fill" style="width:${b[1]}%"></div></div></div><div class="val">${b[2]}</div></div>`).join('')}</div></div><div class="section callout">${p.x}</div></div></div><div class="footer"><span>Prepared for executive outreach</span><span>Based on D2L materials and customer proof</span></div></section></article>`).join('');
document.body.innerHTML=out;
</script>
</body>
</html>
